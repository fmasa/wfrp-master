name: Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  # Needed for reading repository contents (read)
  # and uploading assets to Github Releases (write)
  contents: write
  # Needed for deploying to GitHub Pages
  pages: write
  # Needed for getting the OIDC token for the Github Pages deployment
  # See https://github.com/actions/deploy-pages?tab=readme-ov-file#oidc
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  firestore-migrations:
    name: "Firestore migrations"
    runs-on: ubuntu-22.04
    container: timbru31/java-node:21-jdk-iron
    environment: production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: yarn install
      - run: yarn tsc
      - id: auth
        uses: google-github-actions/auth@v0
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_BASE64 }}
      - run: yarn fireway migrate --path firebase-build/migrations

  conveyor:
    name: "Create desktop distributions"
    needs: [firestore-migrations]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    env:
      CONVEYOR_AGREE_TO_LICENSE: "1"
      APP_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Build JAR
        run: ./gradlew jvmJar

      - name: Build desktop distributions
        uses: hydraulic-software/conveyor/actions/build@v17.0
        with:
          command: make site
          signing_key: ${{ secrets.SIGNING_KEY }}
          agree_to_license: 1
          cache_key: conveyor-${{ matrix.os }}-${{ matrix.arch }}

      - name: Extract download page files from output
        run: |
          mkdir -p pages_output/download
          mv output/download.html pages_output/download/index.html
          mv output/icon.png pages_output/download

      - name: Upload artifacts to Github Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" output/* --clobber

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages_output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-bundle:
    name: Build release bundle
    runs-on: ubuntu-22.04
    container: alvrme/alpine-android:android-34-jdk17
    environment: production
    env:
      KEYSTORE_FILE_BASE64: ${{ secrets.KEYSTORE_FILE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
      - run: echo "$KEYSTORE_FILE_BASE64" | base64 -d > app/.keystore
      - run: echo "SUPPLY_VERSION_CODE=$((950 + $GITHUB_RUN_NUMBER))" >> $GITHUB_ENV
      - run: echo "SUPPLY_VERSION_NAME=$(.github/workflows/version.sh)" >> $GITHUB_ENV
      - run: 'echo "version code: $SUPPLY_VERSION_CODE, version name: $SUPPLY_VERSION_NAME"'
      - run: ./gradlew bundleRelease
      - run: mv app/build/outputs/bundle/release/app-release.aab .
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: app-release.aab
          retention-days: 1

  google-play:
    name: "Publish to Google Play"
    needs:
      - build-bundle
      - firestore-migrations
    runs-on: ubuntu-22.04
    container: ruby:2.7.2-alpine3.12
    concurrency: google-play
    environment: production
    env:
      PLAY_STORE_TRACK: internal
      PLAY_STORE_JSON_FILE: ${{ secrets.PLAY_STORE_JSON_FILE }}
      SUPPLY_UPLOAD_MAX_RETRIES: '5'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Download a single artifact
        uses: actions/download-artifact@v4
        with:
          name: bundle
      - run: apk add build-base
      - run: echo "$PLAY_STORE_JSON_FILE" > fastlane/play_store_credentials.json
      - run: bundle install -j $(nproc)
      - run: bundle exec fastlane deploy
      - run: '[ "$GITHUB_REF_TYPE" = "tag" ] && bundle exec fastlane production || echo "Skipped"'

  firebase-deploy:
    name: "Firebase deploy"
    needs: [firestore-migrations]
    runs-on: ubuntu-22.04
    container: timbru31/java-node:21-jdk-iron
    environment: production
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: yarn install
      - run: yarn firebase deploy
