name: Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      github-release:
        required: true
        type: boolean
    secrets:
      signing-key:
        required: true
      keystore-file-base64:
        required: true
      keystore-password:
        required: true
      key-password:
        required: true
      play-store-json-file:
        required: true
      firebase-token:
        required: true
      google-application-credentials-base64:
        required: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  # Needed for reading repository contents (read)
  # and uploading assets to Github Releases (write)
  contents: write
  # Needed for deploying to GitHub Pages
  pages: write
  # Needed for getting the OIDC token for the Github Pages deployment
  # See https://github.com/actions/deploy-pages?tab=readme-ov-file#oidc
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  firestore-migrations:
    name: "Firestore migrations"
    runs-on: ubuntu-22.04
    container: timbru31/java-node:21-jdk-iron
    environment: production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: yarn install
      - run: yarn tsc
      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.google-application-credentials-base64 }}
      - run: yarn fireway migrate --path firebase-build/migrations

  conveyor:
    name: "Create desktop distributions"
    if: ${{ inputs.github_release }} 
    needs: [firestore-migrations]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    env:
      CONVEYOR_AGREE_TO_LICENSE: "1"
      APP_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build JAR
        run: ./gradlew jvmJar

      - name: Build desktop distributions
        uses: hydraulic-software/conveyor/actions/build@7944fcb4085b3519af85a980e8987b5a4d526f20 # v17.0
        with:
          command: make site
          signing_key: ${{ secrets.signing-key }}
          agree_to_license: 1
          cache_key: conveyor-${{ matrix.os }}-${{ matrix.arch }}

      - name: Extract download page files from output
        run: |
          mkdir -p pages_output/download
          mv output/download.html pages_output/download/index.html
          mv output/icon.png pages_output/download

      - name: Upload artifacts to Github Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: gh release upload "$RELEASE_VERSION" output/* --clobber

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: pages_output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  build-bundle:
    name: Build release bundle
    runs-on: ubuntu-22.04
    container: alvrme/alpine-android:android-34-jdk17
    environment: production
    env:
      KEYSTORE_PASSWORD: ${{ secrets.keystore-password }}
      KEY_PASSWORD: ${{ secrets.key-password }}
      SUPPLY_VERSION_NAME: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-disabled: true
      - run: echo ${{ secrets.keystore-file-base64 }} | base64 -d > app/.keystore
      - run: echo 'SUPPLY_VERSION_CODE="$((950 + $GITHUB_RUN_NUMBER))"' >> $GITHUB_ENV
      - run: 'echo "version code: $SUPPLY_VERSION_CODE, version name: $SUPPLY_VERSION_NAME"'
      - run: ./gradlew bundleRelease
      - run: mv app/build/outputs/bundle/release/app-release.aab .
      - name: Upload bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle
          path: app-release.aab
          retention-days: 1

  google-play:
    name: "Publish to Google Play"
    needs:
      - build-bundle
      - firestore-migrations
    runs-on: ubuntu-22.04
    container: ruby:2.7.2-alpine3.12
    concurrency: google-play
    environment: production
    env:
      PLAY_STORE_TRACK: internal
      SUPPLY_UPLOAD_MAX_RETRIES: '5'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Download a single artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bundle
      - run: apk add build-base
      - run: echo "${{ secrets.play-store-json-file }}" > fastlane/play_store_credentials.json
      - run: bundle install -j $(nproc)
      - run: bundle exec fastlane deploy
      - run: '[ "$GITHUB_REF_TYPE" = "tag" ] && bundle exec fastlane production || echo "Skipped"'

  firebase-deploy:
    name: "Firebase deploy"
    needs: [firestore-migrations]
    runs-on: ubuntu-22.04
    container: timbru31/java-node:21-jdk-iron
    environment: production
    env:
      FIREBASE_TOKEN: ${{ secrets.firebase-token }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: yarn install
      - run: yarn firebase deploy
